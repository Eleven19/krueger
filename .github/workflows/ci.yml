name: CI

on:
  push:
    branches: [main]
    tags-ignore:
      - "v*"
    paths-ignore:
      - ".github/CODEOWNERS"
  pull_request:
    branches: [main]
    paths-ignore:
      - ".github/CODEOWNERS"

# Cancel in-progress runs for the same branch/PR
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Mill caches
        uses: ./.github/actions/setup-mill-caches

      - name: Check formatting
        run: ./mill krueger.core.jvm.checkFormat

      - name: Check itest formatting
        run: ./mill krueger.itest.checkFormat

  build:
    name: Build & Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "25"

      - uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Setup Mill caches
        uses: ./.github/actions/setup-mill-caches

      - name: Compile JVM modules
        run: ./mill krueger.core.jvm.compile

      - name: Run JVM tests
        run: ./mill krueger.core.jvm.test

      - name: Stage webapp-wasm artifacts for itest
        run: ./mill krueger.webapp-wasm.writeToWasmSite

      - name: Run BDD integration tests
        run: ./mill krueger.itest

  build-js:
    name: Build & Test (Scala.js)
    needs: [build]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "25"

      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"
          cache-dependency-path: docs/package-lock.json

      - name: Setup Mill caches
        uses: ./.github/actions/setup-mill-caches

      - name: Compile JS modules
        run: ./mill krueger.core.js.compile

      - name: Run JS tests
        run: ./mill krueger.core.js.test

      - name: Run webapp-wasm Scala.js tests
        run: ./mill krueger.webapp-wasm.test

      - name: Install docs npm dependencies
        run: npm ci
        working-directory: docs

      - name: Install Playwright Chromium
        run: npx playwright install --with-deps chromium
        working-directory: docs

      - name: Run headless browser compiler facade parity check (JS-linked)
        run: |
          ./mill krueger.webapp-wasm.fullLinkJS
          npm --prefix docs run test:webapp-wasm-browser -- -- out/krueger/webapp-wasm/fullLinkJS.dest

      - name: Run Wasm-linked compiler facade smoke
        run: |
          ./mill krueger.webapp-wasm.wasm.fullLinkJS
          npm --prefix docs run test:wasm-facade-smoke

  build-native:
    name: Build & Test (Scala Native)
    needs: [build]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "25"

      - name: Install Scala Native toolchain
        run: |
          sudo apt-get update
          sudo apt-get install -y clang libunwind-dev libgc-dev

      - name: Setup Mill caches
        uses: ./.github/actions/setup-mill-caches

      - name: Compile Native modules
        run: ./mill krueger.core.native.compile

      - name: Run Native tests
        run: ./mill krueger.core.native.test

  build-docs:
    name: Build Docs Site (Scaladoc + playground + Astro)
    needs: [build]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "25"

      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"
          cache-dependency-path: |
            docs/package-lock.json
            sites/try-wasm/package-lock.json

      - name: Cache Coursier
        uses: actions/cache@v4
        with:
          path: ~/.cache/coursier
          key: ${{ runner.os }}-coursier-${{ hashFiles('build.mill.yaml', 'krueger/**/package.mill', 'krueger/**/package.mill.yaml', 'docs/package.mill', 'mill-build/**') }}
          restore-keys: |
            ${{ runner.os }}-coursier-

      - name: Cache Mill out
        uses: actions/cache@v4
        with:
          path: out
          key: ${{ runner.os }}-mill-docs-${{ hashFiles('build.mill.yaml', 'krueger/**/package.mill', 'krueger/**/package.mill.yaml', 'docs/package.mill', 'mill-build/**', 'VERSION') }}
          restore-keys: |
            ${{ runner.os }}-mill-docs-

      - name: Build full site (Scaladoc, playground, Astro, try-wasm stitch)
        run: ./mill docs.site

      - name: Verify docs.site outputs
        run: |
          set -euo pipefail
          missing=0
          for path in \
            docs/dist/index.html \
            docs/dist/api/index.html \
            docs/dist/api/jvm/index.html \
            docs/dist/api/js/index.html \
            docs/dist/api/native/index.html \
            docs/dist/try/index.html \
            sites/try-wasm/static/wasm/facade \
            sites/try-wasm/static/wasm/webgc; do
            if [ ! -e "$path" ]; then
              echo "MISSING: $path"
              missing=1
            fi
          done
          exit $missing

      - name: Upload docs/dist as build artifact
        uses: actions/upload-artifact@v4
        with:
          name: docs-dist
          path: docs/dist
          retention-days: 7
          if-no-files-found: error
